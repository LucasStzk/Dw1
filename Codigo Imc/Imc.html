<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC - Índice de Massa Corporal</title>
    <link rel="stylesheet" href="imc.css">
</head>
<body>
    <header>
        Calculadora de IMC
    </header>

    <main>
        <section>
            <h1>IMC</h1>

            <label for="inputpeso">Peso (kg)</label>
            <input id="inputpeso" type="number" placeholder="Em Kg">

            <label for="inputaltura">Altura (m)</label>
            <input id="inputaltura" type="number" step="0.01" placeholder="Em M">

            <button id="calcularBtn">Calcular</button>

            <div class="resultado">
                <p><strong>IMC:</strong> <span id="resp">0</span></p>
                <p><strong>Classificação:</strong> <span id="classificacao">-</span></p>
            </div>
        </section>
    </main>

    <footer id="footer">
        <span id="mensagem">Preencha os valores e clique em Calcular</span>
    </footer>

</body>
<script src="imc.js"></script>
</html>
