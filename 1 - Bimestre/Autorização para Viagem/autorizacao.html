<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorização para viagem</title>
</head>
<body><header>
    <h1>Formulario para viagem</h1>
        <p>Para participar preencha o formulario</p>
    </header>
    <label for="cpfdoatleta">Cpf do atleta:</label>
    <input type="number" maxlength="11" id="cpfdoatleta">
    <br>
    <label for="nomedoatleta">Nome do atleta:</label>
    <input type="text" id="nomedoatleta">
    <br>
    <label for="idade">Idade:</label>
    <input type="number" id="idade">
    <br>
    <label for="nomedoresponsavel">Nome do responsável:</label>
    <input type="text" id="nomedoresponsavel">
    <br>
    <label for="cidadedeorigem">Cidade de origem:</label>
    <input type="text" id="cidadedeorigem">
    <br>
    <label for="cidadededestino">Cidade de destino:</label>
    <input type="text" id="cidadededestino">
    <br>
    <label for="modalidadeesportiva">Modalidade esportiva:</label>
    <select id="modalidadeesportiva">
        <option value="">-- Selecione uma opção --</option>
        <option value="futebol">Futebol</option>
        <option value="basquete">Basquete</option>
        <option value="volei">Vôlei</option>
        <option value="natacao">Natação</option>
        <option value="atletismo">Atletismo</option>
    </select>
    <br>
    <input type="button" onclick="enviarFormulario()" value="Enviar Formulário">
    <br>
    <span id="saida"></span>
<script src="autorizacao.js"></script>

     
</body>
</html>
